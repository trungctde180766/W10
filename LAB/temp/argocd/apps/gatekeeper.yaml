# ArgoCD App: Install OPA Gatekeeper controller
# sync-wave -2: cài trước mọi thứ để CRD sẵn sàng
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    chart: gatekeeper
    targetRevision: 3.17.1
    helm:
      values: |
        replicas: 1
        auditInterval: 60
        constraintViolationsLimit: 20
        logLevel: WARNING
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
