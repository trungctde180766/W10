---
# ClusterImagePolicy: chỉ accept image đã được ký bằng cosign.pub
# Cài Sigstore Policy Controller trước:
# kubectl apply -f https://github.com/sigstore/policy-controller/releases/download/v0.8.0/release.yaml
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: require-signed-images
spec:
  images:
    - glob: "ghcr.io/**"        # áp dụng cho tất cả image từ GHCR
  authorities:
    - key:
        # Paste nội dung cosign.pub vào đây
        # cosign.pub được commit vào repo (public key an toàn)
        data: |
          -----BEGIN PUBLIC KEY-----
          # PASTE PUBLIC KEY TỪ cosign.pub Ở ĐÂY
          -----END PUBLIC KEY-----
