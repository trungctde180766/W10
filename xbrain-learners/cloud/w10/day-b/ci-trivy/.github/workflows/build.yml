name: Build, Scan, Sign

on:
  push:
    branches: [main, demo]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase repo name (GHCR requirement)
      - name: Set image name
        id: image
        run: |
          echo "name=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build -t ${{ steps.image.outputs.name }}:${{ github.sha }} app/

      # Trivy scan - fail CI nếu có CVE HIGH/CRITICAL
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1    # pipeline dừng nếu có CVE

      # Cosign sign sau khi scan pass
      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Sign image
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            ${{ steps.image.outputs.name }}:${{ github.sha }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      # Push image + signature tự động đi kèm
      - name: Push image
        run: |
          docker push ${{ steps.image.outputs.name }}:${{ github.sha }}
