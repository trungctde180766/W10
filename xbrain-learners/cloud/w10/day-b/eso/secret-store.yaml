---
# SecretStore: kết nối ESO với AWS Secrets Manager
# Auth dùng static credentials (non-EKS). Với EKS dùng IRSA (jwt).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-store
  namespace: demo
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials      # tạo manual bằng kubectl (không commit)
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
