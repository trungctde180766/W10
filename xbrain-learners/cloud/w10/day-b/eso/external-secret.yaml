---
# ExternalSecret: sync secret từ AWS Secrets Manager vào K8s
# refreshInterval: 1m → ESO poll mỗi 60s, Secret tự update không restart pod
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-creds
  namespace: demo
spec:
  refreshInterval: 1m                   # poll mỗi 60s → rotate < 60s
  secretStoreRef:
    name: aws-store
    kind: SecretStore
  target:
    name: db-secret                     # tên K8s Secret sẽ được tạo
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: prod/db/password           # tên secret trong AWS Secrets Manager
