---
# Good deployment: pass tất cả 4 Gatekeeper constraints
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: demo
  labels:
    app: myapp          # ✓ required label
    owner: platform     # ✓ required label
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
        owner: platform
    spec:
      serviceAccountName: app-sa
      securityContext:
        runAsNonRoot: true          # ✓ không chạy root
        runAsUser: 1000
      containers:
        - name: myapp
          image: ghcr.io/YOUR_REPO/myapp:SHA    # ✓ không dùng latest, đã ký
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"           # ✓ có cpu limits
              memory: "256Mi"       # ✓ có memory limits
          securityContext:
            privileged: false       # ✓ không privileged
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: secret-vol
              mountPath: /secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: secret-vol
          secret:
            secretName: db-secret   # từ ESO
