---
# Bind developer role cho user alice
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-binding
  namespace: demo
subjects:
  - kind: User
    name: alice        # thay bằng username thực tế
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: developer
  apiGroup: rbac.authorization.k8s.io

---
# Bind sre role cho user bob
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-binding
  namespace: demo
subjects:
  - kind: User
    name: bob          # thay bằng username thực tế
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: sre
  apiGroup: rbac.authorization.k8s.io

---
# Bind viewer role cho user carol
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: viewer-binding
  namespace: demo
subjects:
  - kind: User
    name: carol        # thay bằng username thực tế
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: viewer
  apiGroup: rbac.authorization.k8s.io

---
# ServiceAccount cho app chạy trong cluster
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: demo
