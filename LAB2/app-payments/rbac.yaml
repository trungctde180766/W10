# LAB 2.3 - RBAC least-privilege cho team payments
# Dùng Role (không phải ClusterRole) → chỉ có quyền trong ns payments
# Verbs: chỉ workload operations, KHÔNG có secrets + rolebindings
#
# Kiểm chứng:
#   kubectl auth can-i create deploy -n payments --as payments-dev  → yes
#   kubectl auth can-i create deploy -n demo     --as payments-dev  → no
#   kubectl auth can-i get secrets -n payments   --as payments-dev  → no
#   kubectl auth can-i get rolebindings -n payments --as payments-dev → no

---
# Role: chỉ workload verbs, bỏ secrets & rolebindings
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payments-developer
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
- apiGroups: ["", "apps", "argoproj.io"]
  resources: ["deployments", "pods", "services", "replicasets", "rollouts", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Không có: secrets, rolebindings, clusterrolebindings

---
# RoleBinding: bind payments-dev vào Role (chỉ trong ns payments)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-dev-binding
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
- kind: User
  name: payments-dev
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: payments-developer
  apiGroup: rbac.authorization.k8s.io
