# ArgoCD App: Cài Sigstore Policy Controller
# sync-wave -2: cài TRƯỚC policies để CRD ClusterImagePolicy sẵn sàng
# Policy Controller chặn image chưa ký tại admission webhook
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policy-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://sigstore.github.io/helm-charts
    chart: policy-controller
    targetRevision: 0.9.0
    helm:
      values: |
        cosign:
          webhookName: "policy.sigstore.dev"
  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
