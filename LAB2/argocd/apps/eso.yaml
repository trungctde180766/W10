# ArgoCD App: Cài ESO operator qua Helm
# sync-wave -3: cài TRƯỚC mọi thứ để CRD (SecretStore, ExternalSecret) sẵn sàng
# Lỗi "no matches for kind SecretStore" xảy ra nếu wave này chạy sau eso-config
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.9.20
    helm:
      values: |
        installCRDs: true
        replicaCount: 1
        webhook:
          replicaCount: 1
        certController:
          replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
