# LAB 2.1 - ESO SecretStore
# Kết nối ESO với AWS Secrets Manager
# AWS credentials được tạo bằng: kubectl create secret generic aws-credentials \
#   --from-literal=access-key-id=<ID> \
#   --from-literal=secret-access-key=<KEY> \
#   -n demo
# KHÔNG commit credentials vào git!
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1               # đổi theo region của bạn
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials     # kubectl create secret (không commit)
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
